openapi: 3.0.3
info:
  title: ZFW Firewall API
  description: |
    HTTP API of the ZFW host firewall for ZimaOS.

    Every endpoint (except `/api/health`) requires an `Authorization: Bearer
    <jwt>` header carrying the ZimaOS session ES256 JWT (the same token the
    web UI puts into `localStorage.access_token` after login). State-
    changing endpoints additionally require a same-origin `Origin` (or
    `Referer`) header — the CSRF guard runs ahead of the rate-limit.

    Non-GET requests share a token-bucket rate-limit (burst 10, sustained
    1/s); excessive traffic is answered with `429 Too Many Requests`.
  version: "0.3.10"
  license:
    name: See repository
servers:
  - url: http://<host>/v2/zfw
    description: ZimaOS gateway route (production)
  - url: http://127.0.0.1:8489
    description: Daemon loopback (development)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ES256 JWT (ZimaOS session token)
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "no rules saved yet — open the Rules tab, add a rule and click Save"
    Health:
      type: object
      properties:
        status:  { type: string, example: ok }
        version: { type: string, example: "0.2.18" }
    Source:
      type: object
      properties:
        type:  { type: string, enum: [any, ip, range, country] }
        value: { type: string, example: "192.168.1.0/24" }
    Ports:
      type: object
      properties:
        type: { type: string, enum: [all, list, range] }
        list: { type: array, items: { type: integer } }
        from: { type: integer, minimum: 1, maximum: 65535 }
        to:   { type: integer, minimum: 1, maximum: 65535 }
    Rule:
      type: object
      properties:
        id:       { type: string }
        order:    { type: integer }
        enabled:  { type: boolean }
        name:     { type: string }
        action:   { type: string, enum: [allow, deny] }
        source:   { $ref: '#/components/schemas/Source' }
        ports:    { $ref: '#/components/schemas/Ports' }
        protocol: { type: string, enum: [tcp, udp, both] }
        zone:     { type: string, enum: [auto, host, docker] }
        notes:    { type: string, maxLength: 256, description: "Free-text rationale; metadata only, never reaches the compiler." }
    RuleSet:
      type: object
      properties:
        version:        { type: integer, example: 1, description: "On-disk schema version. Daemon-owned; clients should pass it through unchanged on POST. An older rules.json on disk is migrated transparently on Load (a .bak.v<old> file is preserved). A rules.json from a newer daemon is refused." }
        lan:            { type: string, example: "192.168.1.0/24" }
        host_ip:        { type: string, example: "192.168.1.167" }
        default_policy: { type: string, enum: [deny, allow] }
        v6_drop:        { type: array, items: { type: integer } }
        rules:          { type: array, items: { $ref: '#/components/schemas/Rule' } }
    FirewallStatus:
      type: object
      properties:
        active:          { type: boolean }
        hooked:          { type: boolean }
        input_rules:     { type: integer }
        docker_drops:    { type: integer }
        ipv6_active:     { type: boolean }
        deadman:         { type: boolean, description: "Safe-Apply auto-revert timer is armed (true) / cancelled or fired (false)" }
        service_enabled: { type: boolean, description: "Boot-persistence zfw.service is enabled" }
    Status:
      type: object
      properties:
        version:  { type: string }
        firewall: { $ref: '#/components/schemas/FirewallStatus' }
        config:
          type: object
          description: Legacy v0.1 allowlist (kept for migration).
    Socket:
      type: object
      properties:
        port:  { type: integer }
        bind:  { type: string }
        proc:  { type: string }
        scope: { type: string, enum: [local, all] }
        reach: { type: string, enum: [lan, blocked, local] }
    Finding:
      type: object
      properties:
        id:     { type: string, example: "H1" }
        sev:    { type: string, enum: [HIGH, MED, LOW] }
        title:  { type: string }
        detail: { type: string }
        status: { type: string, enum: [open, mitigated, fixed] }
        history:
          type: array
          description: "Status timeline persisted across daemon restarts. Each entry records one transition; capped at 20 per finding."
          items:
            type: object
            properties:
              ts:     { type: string, format: date-time }
              status: { type: string, enum: [open, mitigated, fixed] }
    Component:
      type: object
      properties:
        name:    { type: string }
        version: { type: string }
        note:    { type: string }
        level:   { type: string, enum: [ok, warn, crit] }
    Event:
      type: object
      properties:
        time:     { type: string, format: date-time }
        source:   { type: string, example: "192.168.1.46" }
        port:     { type: integer }
        protocol: { type: string, enum: [tcp, udp, icmp] }
        zone:     { type: string, enum: [host, host6, docker] }
    Peer:
      type: object
      description: "A configured follower host (token-stripped view served to the UI)."
      properties:
        name: { type: string, example: "zima-2" }
        url:  { type: string, example: "http://192.168.1.147:8489/api/peers/receive" }
    PeerResult:
      type: object
      description: "Per-peer outcome of a /api/peers/push fanout."
      properties:
        name:  { type: string }
        url:   { type: string }
        ok:    { type: boolean }
        code:  { type: integer, description: "HTTP status returned by the peer; 0 if the request never completed." }
        error: { type: string, description: "Network/HTTP error from this peer; empty on success." }
    UpdateStatus:
      type: object
      description: "Cached self-update check. The daemon polls a configurable manifest URL (ZFW_UPDATE_URL, opt-in) once per week; the UI reads this endpoint and shows a non-blocking 'vX available' badge when Available is true. A nil-URL daemon still serves this endpoint — only Current is set."
      properties:
        current:    { type: string, example: "0.3.9", description: "Daemon's own version (from buildinfo)." }
        latest:     { type: string, example: "0.4.0", description: "Latest version from the manifest. Empty when the checker is disabled or has not run yet." }
        available:  { type: boolean, description: "True when latest is strictly greater than current." }
        notes:      { type: string, description: "Free-text release notes shipped with the manifest." }
        checked_at: { type: string, format: date-time, description: "Timestamp of the last successful or attempted check." }
        error:      { type: string, description: "Network/parse failure from the last attempt. The UI hides the badge silently on error." }

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      summary: Liveness probe — does not require auth.
      security: []
      responses:
        '200':
          description: Daemon is up.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /api/status:
    get:
      summary: Live firewall + config snapshot.
      responses:
        '200':
          description: Current state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }

  /api/rules:
    get:
      summary: Read the saved rule set. Returns an empty deny-default set when no rules.json exists yet.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RuleSet' } } } }
    post:
      summary: Save a new rule set (validates + recompiles).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RuleSet' }
      responses:
        '200': { description: Saved. }
        '400': { description: Validation error., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '429': { description: Rate-limited (burst 10, 1/s sustained). }

  /api/rules/defaults:
    post:
      summary: Generate and persist the recommended starter rule set (auto-LAN + live Docker inventory).
      responses:
        '200': { description: Defaults installed., content: { application/json: { schema: { $ref: '#/components/schemas/RuleSet' } } } }
        '429': { description: Rate-limited. }

  /api/rules/templates:
    get:
      summary: Curated catalog of pre-built rule templates the UI offers in a picker. Each Template embeds Rule objects with the current LAN substituted into "from the LAN" sources.
      responses:
        '200':
          description: Template catalog.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:          { type: string }
                    name:        { type: string }
                    description: { type: string }
                    category:    { type: string, enum: [security, service] }
                    rules:       { type: array, items: { $ref: '#/components/schemas/Rule' } }

  /api/apply:
    post:
      summary: Apply the compiled ruleset. With "safe":true a 120 s dead-man auto-revert is armed.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                safe: { type: boolean, default: false }
      responses:
        '200': { description: Applied. }
        '400':
          description: "Fresh install — no rules saved yet (UI shows: 'open the Rules tab, add a rule and click Save')."
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '429': { description: Rate-limited. }

  /api/commit:
    post:
      summary: Confirm a Safe-Apply. Stops the dead-man timer and installs zfw.service so the rules survive reboot.
      responses:
        '200': { description: Committed. }
        '429': { description: Rate-limited. }

  /api/revert:
    post:
      summary: Remove all ZFW rules, restore stock state, disable boot-persistence.
      responses:
        '200': { description: Reverted. }
        '429': { description: Rate-limited. }

  /api/exposure:
    get:
      summary: Listening TCP/UDP sockets on the host with their LAN-reachability classification.
      responses:
        '200':
          description: Sockets.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Socket' } }

  /api/audit:
    get:
      summary: Audit findings, scored live against the current firewall.
      responses:
        '200':
          description: Findings.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Finding' } }

  /api/versions:
    get:
      summary: Key host components with version + CVE annotations.
      responses:
        '200':
          description: Components.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Component' } }

  /api/peers:
    get:
      summary: List configured follower peers (token-stripped). Empty array when peers.json is missing or empty — the multi-host sync is opt-in.
      responses:
        '200':
          description: Peer list.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Peer' } }

  /api/peers/push:
    post:
      summary: Push the currently saved rules.json to every configured follower's /api/peers/receive endpoint. Returns per-peer Result entries in the same order as peers.json.
      responses:
        '200':
          description: Per-peer fanout outcome.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/PeerResult' } }
        '400': { description: "No rules saved yet on the leader (UI: 'open the Rules tab, add a rule and click Save')." }
        '429': { description: Rate-limited. }

  /api/peers/receive:
    post:
      summary: "Inbound rules push from a leader host. Authentication is a shared bearer (ZFW_PEER_TOKEN) instead of the ZimaOS JWT — the leader has no follower-side session. Returns 403 when the receiver has no ZFW_PEER_TOKEN configured (opt-in)."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RuleSet' }
      responses:
        '200': { description: Rules accepted, saved and recompiled. }
        '400': { description: "Invalid JSON or validation error." }
        '401': { description: "Bearer missing or does not match ZFW_PEER_TOKEN." }
        '403': { description: "Peer-receive disabled (ZFW_PEER_TOKEN unset on this host)." }

  /api/update:
    get:
      summary: Cached result of the self-update check. Returns 200 even when the checker is disabled (empty ZFW_UPDATE_URL) so the UI never sees a 404 — only Current is populated in that case.
      responses:
        '200':
          description: Update status snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateStatus' }

  /api/events:
    get:
      summary: Drop events from the kernel log, parsed from the ZFW-IN-DROP / ZFW-IN6-DROP / ZFW-DOCK-DROP LOG targets.
      parameters:
        - name: since
          in: query
          schema: { type: integer }
          description: Unix-seconds; defaults to now-1h.
        - name: limit
          in: query
          schema: { type: integer, default: 200, maximum: 5000 }
      responses:
        '200':
          description: Newest-first event list.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Event' } }

  /api/config:
    post:
      summary: Legacy v0.1 tier-allowlist endpoint. Kept until UI fully moves to /api/rules.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Tier-based allowlist (host_tcp_lan / host_udp_lan / docker_drop_lan / lan / host_ip / v6_drop)
      responses:
        '200': { description: Saved. }
        '400': { description: Validation error., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '429': { description: Rate-limited. }
